<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaVoice</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="admin.css">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f9; margin: 0; }
        
        /* ---------------------------------------------------
           ส่วน Topbar & Header
        --------------------------------------------------- */
        .user-profile { font-weight: 500; color: #1e3d59; margin-right: 15px; }
        .logout-btn { 
            background-color: #e74c3c; color: white; border: none; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-family: 'Sarabun'; font-weight: 500; transition: background 0.3s;
        }
        .logout-btn:hover { background-color: #c0392b; }

        .card { 
            background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #f0f2f5; 
        }

        /* ---------------------------------------------------
           ส่วนฟอร์มเพิ่มข้อมูลยา
        --------------------------------------------------- */
        #formTitle { color: #1e3d59; font-size: 20px; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #eef2f5; padding-bottom: 10px; }
        .input-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .input-group, .form-group { flex: 1; display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: 600; color: #34495e; font-size: 15px; margin-bottom: 8px; }
        
        input[type="text"], input[type="time"], select, textarea {
            width: 100%; padding: 12px 15px; border: 1px solid #dcdde1; border-radius: 8px; 
            font-family: 'Sarabun'; font-size: 15px; outline: none; transition: all 0.3s ease;
            box-sizing: border-box; background-color: #fbfcfd; color: #2f3640;
        }
        input:focus, select:focus, textarea:focus { border-color: #3498db; background-color: #ffffff; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }

        .button-group { display: flex; gap: 15px; margin-top: 10px; }
        .button-group button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-family: 'Sarabun'; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        #submitBtn { background-color: #2ecc71; color: white; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2); }
        #submitBtn:hover { background-color: #27ae60; transform: translateY(-2px); }
        #cancelBtn { background-color: #95a5a6; color: white; }
        
        .hidden { display: none !important; }

        #result { background-color: #eafaf1; padding: 15px; border-radius: 8px; border-left: 5px solid #2ecc71; margin-top: 20px; }
        #result h3 { color: #27ae60; margin-top: 0; font-size: 16px; }
        #nfcLink { margin-bottom: 10px; background-color: #ffffff; }
        #copyBtn { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-family: 'Sarabun'; font-weight: 600; }

        /* ---------------------------------------------------
           ส่วนค้นหาและตาราง
        --------------------------------------------------- */
        #searchInput { width: 100%; padding: 12px 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #dcdde1; font-family: 'Sarabun'; font-size: 15px; box-sizing: border-box; }
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid #eef2f5; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; background: white; }
        th { background-color: #f8f9fa; color: #1e3d59; font-weight: 600; padding: 15px; text-align: left; white-space: nowrap; border-bottom: 2px solid #eef2f5; }
        td { padding: 15px; border-bottom: 1px solid #eef2f5; color: #2f3640; vertical-align: middle; }

        /* ---------------------------------------------------
           Modal (ป๊อปอัปรายละเอียด)
        --------------------------------------------------- */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(3px); }
        .modal-content { background-color: #fefefe; margin: 10% auto; padding: 25px; border-radius: 16px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; }

        /* ---------------------------------------------------
           Bottom Navigation (ซ่อนในคอมพิวเตอร์)
        --------------------------------------------------- */
        .bottom-nav { display: none; }

        /* =========================================
           📱 โหมดมือถือ (Mobile Responsive)
        ========================================= */
        @media (max-width: 768px) {
            /* เผื่อพื้นที่ด้านล่างสุดให้เมนู ไม่ให้บังเนื้อหา */
            .app-container { padding-bottom: 100px; }
            .content-wrapper { padding: 15px !important; overflow-x: hidden; }
            
            #openSidebar { display: none !important; }
            .sidebar { display: none !important; }

            /* ปรับ Topbar */
            .topbar { flex-wrap: wrap; gap: 10px; padding: 15px; justify-content: space-between; }
            .topbar-left { flex: 1; }
            .page-title { font-size: 18px; margin: 0; font-weight: 700; color: #1e3d59; }
            .user-profile { display: none; }
            .logout-btn { font-size: 13px; padding: 6px 12px; }

            .card { padding: 20px; border-radius: 20px; }
            .input-row { flex-direction: column; gap: 0; margin-bottom: 0; }
            .button-group { flex-direction: column; gap: 10px; }
            .modal-content { margin: 20% auto; padding: 20px; }

            /* 🌟 ดีไซน์ Bottom Navigation สไตล์แอปการแพทย์พรีเมียม 🌟 */
            .bottom-nav {
                display: flex;
                position: fixed;
                /* ให้เมนูลอยขึ้นมาจากขอบล่าง และบวก Safe Area เผื่อ iPhone */
                bottom: calc(15px + env(safe-area-inset-bottom, 0px));
                left: 50%;
                transform: translateX(-50%);
                width: 92%;
                background-color: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px); /* เอฟเฟกต์เบลอพื้นหลังกระจก */
                border-radius: 24px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                border: 1px solid rgba(255, 255, 255, 0.5);
                z-index: 1000;
                justify-content: space-around;
                align-items: center;
                padding: 8px 5px;
            }

            .bottom-nav a {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-decoration: none;
                color: #a4b0be;
                font-size: 11px;
                font-family: 'Sarabun', sans-serif;
                font-weight: 500;
                padding: 8px 15px;
                border-radius: 18px; /* พื้นหลังวงรีเวลากด */
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .bottom-nav a .nav-icon {
                font-size: 22px;
                margin-bottom: 2px;
                filter: grayscale(100%);
                opacity: 0.6;
                transition: transform 0.3s ease;
            }

            /* สไตล์สำหรับปุ่มที่กำลังถูกเลือก (Active) */
            .bottom-nav a.active { 
                background-color: #ebf5fb; /* พื้นหลังสีฟ้าอ่อนๆ */
                color: #2980b9; 
                font-weight: 700;
            }
            .bottom-nav a.active .nav-icon { 
                filter: grayscale(0%); 
                opacity: 1; 
                transform: translateY(-2px) scale(1.15); /* เด้งขึ้นมานิดนึง */
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar (แสดงเฉพาะในคอมพิวเตอร์) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>MedCare</h2>
                <button class="close-btn" id="closeSidebar">✖</button>
            </div>
            <nav class="sidebar-nav">
                <a href="admin.html" class="active">จัดการข้อมูลยา</a>
                <a href="history.html">ประวัติการทานยา</a>
                <a href="analytics.html">แดชบอร์ดสุขภาพ</a>
                <a href="settings.html">ตั้งค่าการแจ้งเตือน</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="openSidebar" class="menu-btn">☰</button>
                    <h3 class="page-title">จัดการข้อมูลยา</h3>
                </div>
                <div>
                    <span class="user-profile">สวัสดีคุณ: <span id="user-display-name">กำลังโหลด...</span></span>
                    <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
                </div>
            </header>

            <div class="content-wrapper" style="display: block; padding: 25px;">
                
                <div class="card form-container">
                    <h2 id="formTitle">💊 เพิ่มข้อมูลยาใหม่</h2>
                    <form id="medForm">
                        <div class="input-row">
                            <div class="input-group">
                                <label for="medId">รหัสยา (NFC):</label>
                                <input type="text" id="medId" placeholder="เช่น M01" required>
                            </div>
                            <div class="input-group">
                                <label for="medName">ชื่อยา:</label>
                                <input type="text" id="medName" placeholder="เช่น พาราเซตามอล" required>
                            </div>
                        </div>

                        <div class="input-row">
                            <div class="input-group">
                                <label for="medDosage">ขนาดรับประทาน:</label>
                                <input type="text" id="medDosage" placeholder="เช่น 1 เม็ด" required>
                            </div>
                            <div class="input-group">
                                <label for="timeTag">ช่วงเวลา:</label>
                                <select id="timeTag" required>
                                    <option value="">-- เลือกเวลา --</option>
                                    <option value="เช้า">เช้า</option>
                                    <option value="กลางวัน">กลางวัน</option>
                                    <option value="เย็น">เย็น</option>
                                    <option value="ก่อนนอน">ก่อนนอน</option>
                                    <option value="อื่นๆ">อื่นๆ</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="medTime">เวลาที่ต้องทานยา:</label>
                            <input type="time" id="medTime" required>
                        </div>

                        <div class="form-group">
                            <label for="medInstruction">วิธีทานเพิ่มเติม:</label>
                            <input type="text" id="medInstruction" placeholder="เช่น หลังอาหารทันที (ปล่อยว่างได้)">
                        </div>

                        <div class="form-group">
                            <label for="medWarning">คำเตือน/ข้อควรระวัง:</label>
                            <textarea id="medWarning" rows="2" placeholder="เช่น ห้ามทานตอนท้องว่าง (ปล่อยว่างได้)"></textarea>
                        </div>

                        <div class="button-group">
                            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
                            <button type="button" id="cancelBtn" class="hidden">ยกเลิก</button>
                        </div>
                    </form>

                    <div id="result" class="hidden">
                        <h3>✅ สร้างลิงก์ NFC สำเร็จ!</h3>
                        <input type="text" id="nfcLink" readonly>
                        <button type="button" id="copyBtn">คัดลอกลิงก์ (Copy)</button>
                    </div>
                </div>

                <div class="card table-container">
                    <input type="text" id="searchInput" placeholder="🔍 ค้นหา ชื่อยา หรือ รหัสยา...">
                    
                    <div class="table-wrapper">
                        <table id="dataTable">
                            <thead>
                                <tr>
                                    <th>รหัส</th>
                                    <th>ชื่อยา</th>
                                    <th>วิธีทาน</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr><td colspan="4" style="text-align:center;">กำลังโหลดข้อมูล...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- 🌟 Bottom Navigation (แสดงเฉพาะในมือถือ) 🌟 -->
    <nav class="bottom-nav">
        <!-- เพิ่มคลาส active ให้ตรงกับหน้าปัจจุบัน -->
        <a href="admin.html" class="active">
            <span class="nav-icon">💊</span>
            <span class="nav-text">จัดการยา</span>
        </a>
        <a href="history.html">
            <span class="nav-icon">🕒</span>
            <span class="nav-text">ประวัติ</span>
        </a>
        <a href="analytics.html">
            <span class="nav-icon">📊</span>
            <span class="nav-text">สรุปผล</span>
        </a>
        <a href="settings.html">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">ตั้งค่า</span>
        </a>
    </nav>

    <!-- Modal (ป๊อปอัปรายละเอียด) -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0;">รายละเอียด</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        document.getElementById('openSidebar')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
        });
        document.getElementById('closeSidebar')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
        });

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('detailsModal');
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
