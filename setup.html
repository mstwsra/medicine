<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าผู้ใช้งาน</title>
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 { color: #333; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #4CAF50; outline: none; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #45a049; }
        .hint { color: #777; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ตั้งค่าผู้ใช้งาน</h2>
    <input type="text" id="setupUserId" placeholder="วางรหัส UUID ที่นี่">
    <button onclick="saveUser()">บันทึกและเริ่มใช้งาน</button>
    <p class="hint">คัดลอกรหัสจากตาราง Users ในระบบมาวาง</p>
</div>

<script>
    function saveUser() {
        const id = document.getElementById('setupUserId').value.trim();
        if(id.length > 10) { // ตรวจสอบความยาวเบื้องต้น
            localStorage.setItem('med_user_id', id);
            alert('ตั้งค่าเสร็จสิ้น! พร้อมบันทึกข้อมูลการทานยาแล้วค่ะ');
            window.location.href = 'index.html';
        } else {
            alert('กรุณากรอกรหัส UUID ให้ถูกต้องค่ะ');
        }
    }
</script>
</body>
</html>
